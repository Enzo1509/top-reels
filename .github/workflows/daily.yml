name: Top Reels quotidien

on:
  schedule:
    # Tous les jours à 20:00 UTC
    - cron: "0 20 * * *"
  workflow_dispatch: {}

permissions:
  contents: read # lecture seule : le run quotidien ne modifie rien dans le dépôt

jobs:
  top-reels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer l'analyse des Reels
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python top_reels.py
